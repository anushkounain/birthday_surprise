<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breaking News</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body{
background:#e6e0d6;
background-image:
url("https://www.transparenttextures.com/patterns/aged-paper.png"),
linear-gradient(#ede7dc,#e3dccf);
font-family:'Libre Baskerville', serif;
display:flex;
justify-content:center;
padding:40px;
}

/* newspaper page */
.newspaper{
width:750px;
background:#f3ede2;
padding:35px;
border:1px solid #c8c1b5;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* top banner */
.masthead{
text-align:center;
border-bottom:4px double black;
padding-bottom:10px;
margin-bottom:20px;
}

.masthead h1{
font-family:'Playfair Display', serif;
font-size:50px;
margin:0;
}

/* small row under banner */
.meta{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:8px;
}

/* headline */
.headline{
font-size:34px;
margin:30px 0 10px 0;
text-align:center;
}

.sub{
font-style:italic;
margin-bottom:30px;
}

/* image */
img{
width:250px;
height:300px;
object-fit:cover;
filter:grayscale(100%);
border:1px solid black;
}

/* button */
button{
margin-top:30px;
padding:12px 22px;
background:black;
color:white;
border:none;
cursor:pointer;
font-family:'Libre Baskerville', serif;
}

button:hover{
background:#333;
}

</style>
</head>

<body>

<div class="newspaper">

<div class="masthead">
<h1>BREAKING NEWS</h1>

<div class="meta">
<span>Special Report</span>
<span>5 July 2026</span>
</div>
</div>

<div class="headline">
MAIRA IS TURNING 19
</div>

<div class="sub">
Exclusive story inside
</div>

<img src="WhatsApp%20Image%202026-03-12%20at%2001.03.33.jpeg">

<br>

<button onclick="window.location.href='gift.html'">
Read Full Story →
</button>

</div>

</body>
</html>
