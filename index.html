<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#ffe6f0;
font-family:'Poppins',sans-serif;
text-align:center;
}

.container{
padding:40px 20px;
}

h1{
font-family:'Pacifico',cursive;
font-size:45px;
color:#ff3b7a;
}

.message{
font-size:18px;
max-width:500px;
margin:auto;
margin-top:20px;
}

.photo{
width:260px;
border-radius:15px;
margin-top:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.heart{
position:fixed;
color:#ff5c8a;
animation:float 6s infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday Sis 🎂</h1>

<p class="message">
You are not just my sister, you are my best friend, my support system,
and someone I’m incredibly grateful for every single day.  
I hope this year brings you all the happiness you deserve ❤️
</p>

<img src="https://picsum.photos/300?random=1" class="photo">
<img src="https://picsum.photos/300?random=2" class="photo">
<img src="https://picsum.photos/300?random=3" class="photo">

<p class="message">
No matter where life takes us, you'll always mean the world to me.
Happy Birthday ❤️
</p>

</div>

<script>

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
