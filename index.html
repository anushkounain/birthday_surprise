<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breaking News</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body{
background:#e6e0d6;
font-family:'Libre Baskerville', serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.paper{
width:700px;
background:#f6f2ea;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.masthead{
border-bottom:4px double black;
padding-bottom:10px;
margin-bottom:20px;
}

.masthead h1{
font-family:'Playfair Display', serif;
font-size:50px;
margin:0;
}

.meta{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:5px;
}

.headline{
font-size:34px;
margin:30px 0 10px 0;
}

.sub{
font-style:italic;
margin-bottom:30px;
}

img{
width:250px;
height:300px;
object-fit:cover;
filter:grayscale(100%);
border:1px solid black;
}

button{
margin-top:30px;
padding:12px 22px;
background:black;
color:white;
border:none;
cursor:pointer;
font-family:'Libre Baskerville', serif;
}

button:hover{
background:#333;
}

</style>
</head>

<body>

<div class="paper">

<div class="masthead">

<h1>BREAKING NEWS</h1>

<div class="meta">
<span>Special Report</span>
<span>July 2026</span>
</div>

</div>

<div class="headline">
MAIRA IS TURNING 21
</div>

<div class="sub">
Exclusive story inside
</div>

<img src="https://picsum.photos/300/350?grayscale">

<br>

<button onclick="window.location.href='gift.html'">
Read Full Story →
</button>

</div>

</body>
</html>
