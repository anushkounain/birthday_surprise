<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday!</title>
<style>
body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:500px;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff4b5c;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Happy Birthday Sis! 🎂</h1>

<p>
You mean so much to me.  
Thank you for always being there, supporting me and making life better.  
I’m really lucky to have you as my sister. ❤️
</p>

<button onclick="showMessage()">Click for a surprise</button>

</div>

<script>
function showMessage(){
alert("No matter how much we fight, you'll always be my favorite person. Happy Birthday ❤️");
}
</script>

</body>

</html>
